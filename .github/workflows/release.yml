name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to rebuild and update (for example: v2.2.1)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  WAILS_VERSION: "v2.13.0"
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Resolve and validate version
        shell: pwsh
        run: |
          $version = (Get-Content wails.json -Raw | ConvertFrom-Json).info.productVersion
          if ($env:RELEASE_TAG -ne "v$version") {
            throw "Release tag $env:RELEASE_TAG does not match application version v$version"
          }
          "APP_VERSION=$version" >> $env:GITHUB_ENV
      - name: Install Wails and NSIS
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${env:WAILS_VERSION}
          choco install nsis --yes --no-progress
      - name: Build Windows installer
        shell: pwsh
        run: wails build -clean -platform windows/amd64 -o MDReaderAssistant.exe -nsis -installscope user -webview2 embed -trimpath -nocolour
      - name: Prepare Windows release asset
        shell: pwsh
        run: |
          $binary = "build/bin/MDReaderAssistant.exe"
          if (-not (Test-Path -LiteralPath $binary -PathType Leaf)) {
            Get-ChildItem build/bin -Recurse | Format-Table FullName, Length
            throw "Expected Windows application binary was not found: $binary"
          }

          $makensisCandidates = @(
            (Get-Command makensis.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -First 1),
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
            "$env:ProgramFiles\NSIS\makensis.exe",
            "$env:ChocolateyInstall\bin\makensis.exe"
          ) | Where-Object { $_ -and (Test-Path -LiteralPath $_ -PathType Leaf) }
          $makensis = $makensisCandidates | Select-Object -First 1
          if (-not $makensis) {
            throw "makensis.exe was not found after installing NSIS"
          }
          Write-Host "Using NSIS compiler: $makensis"

          Push-Location build/windows/installer
          try {
            & $makensis "-DWAILS_INSTALL_SCOPE=user" "-DARG_WAILS_AMD64_BINARY=..\..\bin\MDReaderAssistant.exe" "project.nsi"
            if ($LASTEXITCODE -ne 0) {
              throw "NSIS exited with code $LASTEXITCODE"
            }
          } finally {
            Pop-Location
          }

          $installer = "build/bin/md-reader-assistant-$env:APP_VERSION-windows-amd64.exe"
          if (-not (Test-Path -LiteralPath $installer -PathType Leaf)) {
            Get-ChildItem build/bin -Recurse | Format-Table FullName, Length
            throw "Expected NSIS installer was not found: $installer"
          }

          $releaseDir = New-Item -ItemType Directory -Force build/bin/release
          $target = Join-Path $releaseDir.FullName "md-reader-assistant-$env:APP_VERSION-windows-amd64.exe"
          Copy-Item -LiteralPath $installer -Destination $target -Force
          Get-Item -LiteralPath $target | Format-Table FullName, Length
      - uses: actions/upload-artifact@v4
        with:
          name: md-reader-assistant-windows-x64
          path: build/bin/release/*.exe
          if-no-files-found: error

  macos:
    name: macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Resolve and validate version
        shell: bash
        run: |
          version="$(node -p "require('./wails.json').info.productVersion")"
          if [[ "${RELEASE_TAG}" != "v${version}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match application version v${version}" >&2
            exit 1
          fi
          echo "APP_VERSION=${version}" >> "${GITHUB_ENV}"
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
      - name: Build universal macOS application
        run: wails build -clean -platform darwin/universal -o MDReaderAssistant -trimpath -nocolour
      - name: Create DMG
        shell: bash
        run: |
          app_path="$(find build/bin -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [[ -z "${app_path}" ]]; then
            find build/bin -maxdepth 3 -print
            echo "The macOS .app bundle was not found in build/bin" >&2
            exit 1
          fi

          release_dir="build/bin/release"
          staging_dir="$(mktemp -d)"
          output_path="${release_dir}/md-reader-assistant-${APP_VERSION}-macos-universal.dmg"
          mkdir -p "${release_dir}"
          cp -R "${app_path}" "${staging_dir}/MD阅读助手.app"
          ln -s /Applications "${staging_dir}/Applications"

          created=false
          for attempt in 1 2 3; do
            echo "Creating DMG (attempt ${attempt}/3)..."
            rm -f "${output_path}"
            if hdiutil create -volname "MD阅读助手" -srcfolder "${staging_dir}" -ov -format UDZO "${output_path}"; then
              created=true
              break
            fi
            sleep 5
          done
          rm -rf "${staging_dir}"

          if [[ "${created}" != "true" || ! -f "${output_path}" ]]; then
            echo "Unable to create the macOS DMG after 3 attempts" >&2
            exit 1
          fi
          ls -lh "${output_path}"
      - uses: actions/upload-artifact@v4
        with:
          name: md-reader-assistant-macos-universal
          path: build/bin/release/*.dmg
          if-no-files-found: error

  linux:
    name: Linux x64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Resolve and validate version
        shell: bash
        run: |
          version="$(node -p "require('./wails.json').info.productVersion")"
          if [[ "${RELEASE_TAG}" != "v${version}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match application version v${version}" >&2
            exit 1
          fi
          echo "APP_VERSION=${version}" >> "${GITHUB_ENV}"
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
      - name: Build Linux executable
        run: wails build -clean -platform linux/amd64 -o md-reader-assistant -tags webkit2_41 -trimpath -nocolour
      - name: Build DEB and AppImage packages
        run: |
          mkdir -p package-root/DEBIAN package-root/usr/bin package-root/usr/share/applications package-root/usr/share/icons/hicolor/512x512/apps package-root/usr/share/mime/packages
          install -m 755 build/bin/md-reader-assistant package-root/usr/bin/md-reader-assistant
          install -m 644 packaging/linux/md-reader-assistant.desktop package-root/usr/share/applications/md-reader-assistant.desktop
          install -m 644 packaging/linux/md-reader-assistant.xml package-root/usr/share/mime/packages/md-reader-assistant.xml
          install -m 644 build/appicon.png package-root/usr/share/icons/hicolor/512x512/apps/md-reader-assistant.png
          sed "s/@VERSION@/${APP_VERSION}/g" packaging/linux/control > package-root/DEBIAN/control
          install -m 755 packaging/linux/postinst package-root/DEBIAN/postinst
          install -m 755 packaging/linux/postrm package-root/DEBIAN/postrm
          dpkg-deb --build package-root "build/bin/md-reader-assistant-${APP_VERSION}-linux-amd64.deb"

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/512x512/apps
          install -m 755 build/bin/md-reader-assistant AppDir/usr/bin/md-reader-assistant
          install -m 755 packaging/linux/AppRun AppDir/AppRun
          install -m 644 packaging/linux/md-reader-assistant.desktop AppDir/md-reader-assistant.desktop
          install -m 644 build/appicon.png AppDir/md-reader-assistant.png
          curl -L --fail -o appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ARCH=x86_64 ./appimagetool.AppImage --appimage-extract-and-run AppDir "build/bin/md-reader-assistant-${APP_VERSION}-linux-x86_64.AppImage"
      - uses: actions/upload-artifact@v4
        with:
          name: md-reader-assistant-linux-x64
          path: |
            build/bin/md-reader-assistant-*-linux-amd64.deb
            build/bin/md-reader-assistant-*-linux-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Prepare release notes
        run: |
          version="${RELEASE_TAG#v}"
          awk -v heading="## [${version}]" '
            index($0, heading) == 1 { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            printf 'md-reader-assistant %s\n\nSee the repository changelog for details.\n' "${version}" > release-notes.md
          fi
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          version="${RELEASE_TAG#v}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --title "md-reader-assistant ${version}" --notes-file release-notes.md
            gh release upload "${RELEASE_TAG}" release-assets/* --clobber

            mapfile -t existing_assets < <(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')
            for asset in "${existing_assets[@]}"; do
              case "${asset}" in
                MD.*|MD阅读助手-*|MDReaderAssistant-Setup-*)
                  gh release delete-asset "${RELEASE_TAG}" "${asset}" --yes
                  ;;
              esac
            done
          else
            gh release create "${RELEASE_TAG}" release-assets/* --notes-file release-notes.md --title "md-reader-assistant ${version}"
          fi
