<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: file:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self';">
  <title>MD阅读助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="titlebar">
    <div class="brand" aria-label="MD阅读助手">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.7 4.3C13.2 4.1 7.8 6.5 5.4 11.1c-1.1 2.1-1.2 4.2-.6 5.9 3.5-4.3 7.3-6.5 11.6-7.6-4 1.8-7.4 4.5-10.2 8.4 2.1.5 4.4.1 6.5-1.3 4.4-2.9 6.4-7.4 7-12.2Z"/></svg>
      </span>
      <span>MD阅读助手</span>
    </div>
    <div class="toolbar no-drag">
      <button id="openFileButton" class="toolbar-button primary" title="打开文件 (Ctrl+O)">
        <svg viewBox="0 0 24 24"><path d="M4 19V7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v10H4Z"/><path d="M4 11h16"/></svg>
        <span>打开文档</span>
      </button>
      <button id="openFolderButton" class="icon-button" title="打开文件夹 (Ctrl+Shift+O)">
        <svg viewBox="0 0 24 24"><path d="M3.5 18.5V7a2 2 0 0 1 2-2h4l2 2h7a2 2 0 0 1 2 2v9.5H3.5Z"/></svg>
      </button>
      <span class="toolbar-divider"></span>
      <button id="editButton" class="toolbar-button mode-button" title="切换编辑/预览 (Ctrl+E)" disabled>
        <svg viewBox="0 0 24 24"><path d="m4 16-.8 4 4-.8L18.5 7.9l-3.4-3.4L4 16Z"/><path d="m13.7 5.9 3.4 3.4"/></svg>
        <span id="editButtonLabel">编辑</span>
      </button>
      <button id="saveButton" class="icon-button" title="保存 (Ctrl+S)" disabled>
        <svg viewBox="0 0 24 24"><path d="M5 3.5h12l2 2v15H5v-17Z"/><path d="M8 3.5v6h8v-6M8 20.5v-7h8v7"/></svg>
      </button>
      <span class="toolbar-divider"></span>
      <button id="searchButton" class="icon-button" title="在文档中查找 (Ctrl+F)">
        <svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6"/><path d="m15 15 5 5"/></svg>
      </button>
      <button id="themeButton" class="icon-button" title="切换明暗主题">
        <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M20 15.4A8 8 0 0 1 8.6 4 8 8 0 1 0 20 15.4Z"/></svg>
      </button>
      <button id="moreButton" class="icon-button" title="更多选项">
        <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
      </button>
    </div>
  </header>

  <div id="searchBar" class="search-bar hidden no-drag">
    <svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6"/><path d="m15 15 5 5"/></svg>
    <input id="searchInput" type="search" placeholder="在文档中查找…" autocomplete="off">
    <span id="searchCount">0 / 0</span>
    <button id="searchPrev" title="上一个">↑</button>
    <button id="searchNext" title="下一个">↓</button>
    <button id="closeSearch" title="关闭">×</button>
  </div>

  <main class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-heading">
        <div>
          <span class="eyebrow">文档库</span>
          <h2 id="libraryName">最近阅读</h2>
        </div>
        <button id="collapseSidebar" class="small-icon" title="收起侧栏">
          <svg viewBox="0 0 24 24"><path d="m14 7-5 5 5 5"/></svg>
        </button>
      </div>
      <div id="fileList" class="file-list"></div>
      <button id="folderCta" class="folder-cta">
        <span class="cta-icon"><svg viewBox="0 0 24 24"><path d="M3.5 18.5V7a2 2 0 0 1 2-2h4l2 2h7a2 2 0 0 1 2 2v9.5H3.5Z"/></svg></span>
        <span><strong>打开文档文件夹</strong><small>集中浏览你的 Markdown</small></span>
      </button>
    </aside>

    <button id="expandSidebar" class="rail-button hidden" title="展开侧栏">
      <svg viewBox="0 0 24 24"><path d="m10 7 5 5-5 5"/></svg>
    </button>

    <section class="reader-pane">
      <div id="welcome" class="welcome">
        <div class="welcome-visual">
          <div class="paper paper-back"></div>
          <div class="paper paper-front">
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="leaf-float">
            <svg viewBox="0 0 40 40"><path d="M34 6C20 5 9 11 6 24c-.7 3.2-.2 6 1.2 8.2C14 21 22.2 16 30 13 21.5 17.5 15 23.2 9.8 32.8c5.8 1.8 11.8-.8 16.2-5.2C31.8 21.7 33.5 14.1 34 6Z"/></svg>
          </div>
        </div>
        <span class="eyebrow">MD READER &amp; EDITOR</span>
        <h1>阅读与编辑，都更简单</h1>
        <p>一个专注、舒适的 Markdown 阅读与编辑空间。<br>打开文档，沉浸在文字本身。</p>
        <div class="welcome-actions">
          <button id="welcomeOpenFile" class="large-button primary">打开 Markdown 文档</button>
          <button id="welcomeOpenFolder" class="large-button secondary">打开文件夹</button>
        </div>
        <div class="drop-hint"><kbd>Ctrl</kbd><span>+</span><kbd>O</kbd><span>快速打开，也可以将文件拖到这里</span></div>
      </div>

      <div id="documentView" class="document-view hidden">
        <div class="document-meta">
          <div class="breadcrumb" id="breadcrumb"></div>
          <div class="document-actions">
            <button id="revealButton" class="text-button" title="在资源管理器中显示">定位文件</button>
            <button id="printButton" class="text-button" title="打印文档">打印</button>
          </div>
        </div>
        <article id="markdownContent" class="markdown-body"></article>
        <footer class="article-footer">
          <span class="footer-leaf"><svg viewBox="0 0 24 24"><path d="M19.7 4.3C13.2 4.1 7.8 6.5 5.4 11.1c-1.1 2.1-1.2 4.2-.6 5.9 3.5-4.3 7.3-6.5 11.6-7.6-4 1.8-7.4 4.5-10.2 8.4 2.1.5 4.4.1 6.5-1.3 4.4-2.9 6.4-7.4 7-12.2Z"/></svg></span>
          <span>阅读结束</span>
        </footer>
      </div>

      <div id="editorView" class="editor-view hidden">
        <section class="editor-preview-pane">
          <div class="split-pane-header">
            <div>
              <span class="eyebrow">实时预览</span>
              <strong>阅读效果</strong>
            </div>
          </div>
          <div class="editor-preview-scroll">
            <article id="editorPreviewContent" class="markdown-body editor-preview-content"></article>
          </div>
        </section>
        <section class="editor-workspace">
          <div class="editor-header">
            <div>
              <span class="eyebrow">MARKDOWN 编辑器</span>
              <strong id="editorFileName">未命名文档</strong>
            </div>
            <div class="editor-status">
              <span id="editorSaveState">已保存</span>
              <button id="saveAsButton" class="text-button">另存为</button>
            </div>
          </div>
          <div id="markdownEditor" aria-label="Markdown 编辑器"></div>
          <div class="editor-footer">
            <span id="editorPosition">第 1 行，第 1 列</span>
            <span><kbd>Ctrl</kbd> + <kbd>S</kbd> 保存　 <kbd>Ctrl</kbd> + <kbd>E</kbd> 预览</span>
          </div>
        </section>
      </div>

      <button id="backToTop" class="back-to-top" title="回到顶部" aria-label="回到文档顶部">
        <svg viewBox="0 0 24 24"><path d="m6 14 6-6 6 6"/><path d="M12 8v11"/></svg>
      </button>
    </section>

    <aside id="tocPanel" class="toc-panel hidden">
      <span class="eyebrow">本页目录</span>
      <nav id="toc" class="toc"></nav>
      <div class="reading-progress"><span id="progressBar"></span></div>
      <small id="readingTime"></small>
    </aside>
  </main>

  <div id="dropOverlay" class="drop-overlay hidden">
    <div><svg viewBox="0 0 24 24"><path d="M12 16V4m0 0L7 9m5-5 5 5M5 14v5h14v-5"/></svg><strong>松开以打开文档</strong></div>
  </div>

  <div id="moreMenu" class="popover hidden no-drag">
    <button data-action="default-app">设为默认 MD 应用 <span>Windows 设置</span></button>
    <hr>
    <button data-action="zoom-in">放大文字 <span>Ctrl +</span></button>
    <button data-action="zoom-out">缩小文字 <span>Ctrl −</span></button>
    <button data-action="zoom-reset">恢复字号 <span>Ctrl 0</span></button>
    <hr>
    <button data-action="print">打印文档 <span>Ctrl P</span></button>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="../dist/renderer.js"></script>
</body>
</html>
